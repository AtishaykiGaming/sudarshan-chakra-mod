name: Build Sudarshan Chakra Mod

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Cache Minecraft libraries
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/loom-cache
          key: ${{ runner.os }}-minecraft-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-minecraft-

      - name: Build mod
        run: gradle build

      - name: Upload mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: sudarshan-chakra-mod-jar
          path: build/libs/sudarshan-chakra-mod-*.jar
          if-no-files-found: error
          retention-days: 30
